[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Markers para categorización quirúrgica
markers =
    unit: Pruebas unitarias de lógica pura (sin DB).
    integration: Pruebas de integración con base de datos temporal.
    regression: Pruebas de regresión para paridad matemática Bit-Identical.
    rbac: Pruebas de seguridad y cumplimiento de roles/permisos.
    xml: Pruebas del motor de ingesta y parseo de XML.
    rpt: Pruebas del motor de consolidación de planillas.
    performance: Pruebas de latencia y carga (aisladas).
    security: Pruebas de bypass y vulnerabilidades.

# Configuración de ejecución
addopts = -v --strict-markers --tb=short
timeout = 30
